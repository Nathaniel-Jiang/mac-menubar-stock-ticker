name: ❓ Question / Help
description: Stuck on setup or unsure how something works?
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        ## Try Discussions first

        Most "how do I..." questions are a better fit for
        [Discussions](../../discussions/categories/q-a) than Issues — they're
        searchable, others answer them, and the answer helps the next person
        with the same question.

        Issues are best when you suspect a bug or genuinely something to fix
        in the code. If you're not sure which one applies, open a Discussion
        and we can convert it to an Issue if needed.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What are you trying to do? What have you already tried?
    validations:
      required: true
