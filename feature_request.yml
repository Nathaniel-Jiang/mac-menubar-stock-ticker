name: 💡 Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! A short heads-up:

        - For broad UX discussions (e.g. "should we add a sidebar?"),
          consider [Discussions](../../discussions) first — Issues are best
          for concrete proposals
        - This project intentionally stays a single file with zero dependencies.
          Suggestions that require `pip install <heavy>` are unlikely to land

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        What are you trying to do that the plugin makes hard or impossible today?
      placeholder: |
        Example: I trade options and want to see Greeks for my open positions,
        but the plugin only shows stock prices.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? Mockups / pseudo-config welcome.
      placeholder: |
        Add an OPTIONS_POSITIONS config section with strike/expiry, and show
        delta/gamma in the dropdown under the relevant ticker.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about? Why not those?
    validations:
      required: false

  - type: dropdown
    id: contribute
    attributes:
      label: Would you contribute the change?
      options:
        - "Yes — I'd open a PR"
        - "Maybe, with some guidance"
        - "No, just suggesting"
    validations:
      required: true
